name: CI Model Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install MLflow
      run: pip install mlflow==2.19.0

    - name: Run MLProject
      run: |
        cd MLProject
        mlflow run . --no-conda -P env_manager=local
